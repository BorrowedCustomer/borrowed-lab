<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rings - Meditative Focus Timers</title>
  <style>
    :root {
      --timer-size: 280px;
      --grid-gap: 48px;
      --back-offset: 24px;
    }

    @media (max-width: 600px) {
      :root {
        --back-offset: 12px;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0a0a;
      overflow: hidden;
      width: 100vw;
      min-height: 100vh;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      padding: 0;
    }

    /* Minimal Top-Left Back Link */
    .back-link {
      position: absolute;
      top: var(--back-offset);
      left: var(--back-offset);
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.45);
      text-decoration: none;
      z-index: 100;
      transition: color 0.2s ease;
      letter-spacing: -0.01em;
    }

    .back-link:hover {
      color: #ffffff;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    /* 2x2 Grid Container */
    .grid-container {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, var(--timer-size));
      grid-template-rows: repeat(2, var(--timer-size));
      gap: var(--grid-gap);
      justify-content: center;
      align-content: center;
    }

    .grid-line {
      position: absolute;
      background-color: rgba(255, 255, 255, 0.03);
      pointer-events: none;
      z-index: 1; /* Behind canvases */
    }

    .grid-line.horizontal-line {
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      transform: translateY(-50%);
    }

    .grid-line.vertical-line {
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      transform: translateX(-50%);
    }

    .clock-cell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: var(--timer-size);
      height: var(--timer-size);
    }

    .clock-canvas {
      display: block;
      width: var(--timer-size);
      height: var(--timer-size);
      background: transparent;
      z-index: 10;
    }

    /* Clock Labels */
    .clock-label {
      position: absolute;
      top: calc(var(--timer-size) + 12px);
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
      pointer-events: none;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: color 0.2s ease;
    }

    .clock-cell.running .clock-label {
      color: rgba(255, 255, 255, 0.45);
    }

    .status-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background-color: #FF3322;
      box-shadow: 0 0 4px #FF3322;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .clock-cell.running .status-dot {
      opacity: 1;
    }

    /* Center Meeting Element - Fixed Overlay */
    .center-time {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 200;
      background: rgba(255, 255, 255, 0.04);
      padding: 8px 16px;
      border-radius: 2px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .center-time .now-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      margin-bottom: 2px;
      line-height: 1;
    }

    .center-time .time-readout {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.12em;
      line-height: 1.2;
    }

    @media (max-width: 600px) {
      .center-time .time-readout {
        font-size: 11px;
      }
      .center-time {
        padding: 6px 12px;
      }
    }

    /* Fullscreen Alarm Overlay */
    .alarm-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0a0a0a;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-out;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .alarm-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .alarm-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .alarm-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: ui-monospace, SFMono-Regular, monospace;
      pointer-events: none;
    }

    .alarm-timer-id {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .alarm-title {
      font-size: 12vw;
      font-weight: 900;
      color: #FF3322;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      transform: translateY(30px);
      opacity: 0;
    }

    .alarm-current-time {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 20px;
    }

    .alarm-divider {
      width: 120px;
      height: 1px;
      background-color: rgba(255, 255, 255, 0.15);
      margin-bottom: 20px;
    }

    .alarm-dismiss {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <!-- Back Button Link -->
  <a href="../../index.html" class="back-link">↩ back</a>

  <!-- 2x2 Grid Layout for Timers -->
  <div class="grid-container" id="gridContainer">
    <!-- Subtle Crossing Grid Lines -->
    <div class="grid-line horizontal-line"></div>
    <div class="grid-line vertical-line"></div>

    <!-- Clock Cell 01 -->
    <div class="clock-cell" id="cell-0">
      <canvas class="clock-canvas" width="280" height="280"></canvas>
      <div class="clock-label"><span class="status-dot"></span>TIMER 01</div>
    </div>

    <!-- Clock Cell 02 -->
    <div class="clock-cell" id="cell-1">
      <canvas class="clock-canvas" width="280" height="280"></canvas>
      <div class="clock-label"><span class="status-dot"></span>TIMER 02</div>
    </div>

    <!-- Clock Cell 03 -->
    <div class="clock-cell" id="cell-2">
      <canvas class="clock-canvas" width="280" height="280"></canvas>
      <div class="clock-label"><span class="status-dot"></span>TIMER 03</div>
    </div>

    <!-- Clock Cell 04 -->
    <div class="clock-cell" id="cell-3">
      <canvas class="clock-canvas" width="280" height="280"></canvas>
      <div class="clock-label"><span class="status-dot"></span>TIMER 04</div>
    </div>
  </div>

  <!-- Shared Viewport Center Overlay -->
  <div class="center-time" id="centerTime">
    <div class="now-label">NOW</div>
    <div class="time-readout">00:00:00</div>
  </div>

  <!-- Fullscreen Alarm Overlay -->
  <div class="alarm-overlay" id="alarmOverlay">
    <canvas class="alarm-canvas" id="alarmCanvas"></canvas>
    <div class="alarm-content">
      <div class="alarm-timer-id" id="alarmTimerId">TIMER 01</div>
      <div class="alarm-title" id="alarmTitle">TIME'S UP</div>
      <div class="alarm-current-time" id="alarmCurrentTime">00:00:00</div>
      <div class="alarm-divider"></div>
      <div class="alarm-dismiss" id="alarmDismiss">TAP TO DISMISS</div>
    </div>
  </div>

  <script>
    // Double digit formatting helper
    function pad(num) {
      return String(num).padStart(2, '0');
    }

    // Timepiece Timer Concentric Ring Class
    class TimerRing {
      constructor(index, containerEl) {
        this.index = index;
        this.containerEl = containerEl;
        this.canvas = containerEl.querySelector('.clock-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.labelEl = containerEl.querySelector('.clock-label');
        this.scale = 1.0; // default scale

        // Timer States
        this.timerState = {
          active: false,
          duration: 0,
          timeLeft: 0,
          startTime: 0
        };

        this.timerStartTimestamp = 0;
        this.timerCompleteAnim = {
          active: false,
          startTime: 0
        };

        this.dragState = 'idle'; // 'idle', 'setting', 'adjusting'
        this.dragMinutes = 0;
        this.hasDraggedOnce = false;

        // Opacity mapping and fade out timers
        this.ringCompleteTime = Array(8).fill(null);

        // Sparks / Click bursts
        this.clickBursts = [];

        this.mouseX = 0;
        this.mouseY = 0;

        // Breathing parameters & Gap parameters
        this.breathePeriods = [];
        this.breathePhases = [];
        this.gapSpeeds = [];
        this.gapAngles = [];
        this.gapWidths = [];
        for (let i = 0; i < 8; i++) {
          this.breathePeriods.push(3000 + Math.random() * 3000); // 3-6s
          this.breathePhases.push(Math.random() * Math.PI * 2);
          const speed = (0.0002 + Math.random() * 0.0008) * (Math.random() < 0.5 ? 1 : -1);
          this.gapSpeeds.push(speed);
          this.gapAngles.push(Math.random() * Math.PI * 2);
          this.gapWidths.push((3 + Math.random() * 2) * Math.PI / 180); // 3-5 degrees
        }

        // Background asymmetric offset
        this.bgOffsetAngle = Math.random() * Math.PI * 2;
        this.bgOffsetDist = 15 + Math.random() * 20; // 15-35px

        this.setupEvents();
      }

      setupEvents() {
        const getLocalCoords = (clientX, clientY) => {
          const rect = this.canvas.getBoundingClientRect();
          return {
            x: clientX - rect.left,
            y: clientY - rect.top
          };
        };

        this.canvas.addEventListener('mousedown', (e) => {
          const coords = getLocalCoords(e.clientX, e.clientY);
          this.handleStart(coords.x, coords.y);
        });

        this.canvas.addEventListener('mousemove', (e) => {
          const coords = getLocalCoords(e.clientX, e.clientY);
          this.handleMove(coords.x, coords.y);
        });

        window.addEventListener('mouseup', () => {
          this.handleEnd();
        });

        this.canvas.addEventListener('click', (e) => {
          const coords = getLocalCoords(e.clientX, e.clientY);
          this.createClickBurst(coords.x, coords.y);
        });

        this.canvas.addEventListener('dblclick', () => {
          this.resetTimer();
        });

        // Touch support
        this.canvas.addEventListener('touchstart', (e) => {
          const touch = e.touches[0];
          const coords = getLocalCoords(touch.clientX, touch.clientY);
          this.handleStart(coords.x, coords.y);
        }, { passive: true });

        this.canvas.addEventListener('touchmove', (e) => {
          const touch = e.touches[0];
          const coords = getLocalCoords(touch.clientX, touch.clientY);
          this.handleMove(coords.x, coords.y);
        }, { passive: true });

        this.canvas.addEventListener('touchend', () => {
          this.handleEnd();
        });
      }

      getRingRadius(i) {
        const maxRadius = (this.canvas.width / 2) * 0.88;
        return maxRadius - i * (maxRadius * 0.75 / 7);
      }

      getAngleFromMouse(cx, cy, mx, my, rotationAngle) {
        const angle = Math.atan2(my - cy, mx - cx);
        let localAngle = angle - rotationAngle;
        let normAngle = localAngle + Math.PI / 2;
        normAngle = (normAngle % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        return (normAngle / (Math.PI * 2)) * 60;
      }

      updateCursor(cx, cy, mx, my, rotationAngle) {
        const d = Math.hypot(mx - cx, my - cy);
        const maxRadius = (this.canvas.width / 2) * 0.88;

        let isNearTip = false;
        if (this.timerState.active && this.timerState.timeLeft > 0) {
          const activeIdx = Math.floor(((this.timerState.duration - this.timerState.timeLeft) / this.timerState.duration) * 8);
          const activeIdxClamped = Math.max(0, Math.min(7, activeIdx));
          const radius = this.getRingRadius(activeIdxClamped);

          const S_d = this.timerState.duration / 8;
          const elapsedInSeg = (this.timerState.duration - this.timerState.timeLeft) % S_d;
          const ratioRemaining = 1 - (elapsedInSeg / S_d);
          const rotationOffset = (Date.now() * 0.0004) % (Math.PI * 2);
          const startAngle = -Math.PI / 2 + rotationOffset + (Math.PI * 2) * (1 - ratioRemaining);

          const tipX = cx + Math.cos(startAngle) * radius;
          const tipY = cy + Math.sin(startAngle) * radius;
          const distToTip = Math.hypot(mx - tipX, my - tipY);
          if (distToTip <= 30 * this.scale) {
            isNearTip = true;
          }
        }

        const isNearOuterRing = Math.abs(d - maxRadius) <= 30 * this.scale;

        if (this.dragState !== 'idle') {
          this.canvas.style.cursor = 'grabbing';
          document.body.style.cursor = 'grabbing';
        } else if (isNearTip || (!this.timerState.active && isNearOuterRing)) {
          this.canvas.style.cursor = 'grab';
        } else {
          this.canvas.style.cursor = 'default';
        }
      }

      handleStart(mx, my) {
        const cx = this.canvas.width / 2;
        const cy = this.canvas.height / 2;
        const d = Math.hypot(mx - cx, my - cy);
        const maxRadius = (this.canvas.width / 2) * 0.88;
        
        if (this.timerState.active) {
          const activeIdx = Math.floor(((this.timerState.duration - this.timerState.timeLeft) / this.timerState.duration) * 8);
          const activeIdxClamped = Math.max(0, Math.min(7, activeIdx));
          const radius = this.getRingRadius(activeIdxClamped);

          const S_d = this.timerState.duration / 8;
          const elapsedInSeg = (this.timerState.duration - this.timerState.timeLeft) % S_d;
          const ratioRemaining = 1 - (elapsedInSeg / S_d);
          const rotationOffset = (Date.now() * 0.0004) % (Math.PI * 2);
          const startAngle = -Math.PI / 2 + rotationOffset + (Math.PI * 2) * (1 - ratioRemaining);

          const tipX = cx + Math.cos(startAngle) * radius;
          const tipY = cy + Math.sin(startAngle) * radius;

          const distToTip = Math.hypot(mx - tipX, my - tipY);
          if (distToTip <= 30 * this.scale) {
            this.dragState = 'adjusting';
            this.hasDraggedOnce = true;
            this.dragMinutes = Math.max(1, Math.min(60, this.getAngleFromMouse(cx, cy, mx, my, rotationOffset)));
          }
        } else {
          const isNearOuterRing = Math.abs(d - maxRadius) <= 30 * this.scale;
          if (isNearOuterRing) {
            this.dragState = 'setting';
            this.hasDraggedOnce = true;
            this.dragMinutes = Math.max(1, Math.min(60, this.getAngleFromMouse(cx, cy, mx, my, 0)));
          }
        }
      }

      handleMove(mx, my) {
        this.mouseX = mx;
        this.mouseY = my;

        const cx = this.canvas.width / 2;
        const cy = this.canvas.height / 2;

        let rotationAngle = 0;
        if (this.timerState.active) {
          rotationAngle = (Date.now() * 0.0004) % (Math.PI * 2);
        }

        this.updateCursor(cx, cy, mx, my, rotationAngle);

        if (this.dragState !== 'idle') {
          const calculatedMinutes = this.getAngleFromMouse(cx, cy, mx, my, rotationAngle);
          this.dragMinutes = Math.max(1, Math.min(60, calculatedMinutes));
          
          if (this.dragState === 'adjusting') {
            const targetDuration = Math.round(this.dragMinutes) * 60;
            if (targetDuration > this.timerState.duration) {
              this.timerState.duration = targetDuration;
            }
            this.timerState.timeLeft = targetDuration;
            this.timerState.startTime = Date.now() - (this.timerState.duration - targetDuration) * 1000;
          }
        }
      }

      handleEnd() {
        if (this.dragState !== 'idle') {
          const targetDuration = Math.round(this.dragMinutes) * 60;
          
          if (this.dragState === 'setting') {
            this.timerState.active = true;
            this.timerState.duration = targetDuration;
            this.timerState.timeLeft = targetDuration;
            this.timerState.startTime = Date.now();
            this.timerStartTimestamp = Date.now();
            this.timerCompleteAnim.active = false;
          }

          this.dragState = 'idle';
          document.body.style.cursor = 'default';
        }
      }

      createClickBurst(x, y) {
        const lines = [];
        for (let i = 0; i < 8; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 2 + 1;
          lines.push({
            angle: angle,
            speed: speed,
            length: 20
          });
        }
        this.clickBursts.push({
          x: x,
          y: y,
          startTime: Date.now(),
          lines: lines
        });
      }

      resetTimer() {
        this.timerState.active = false;
        this.timerState.duration = 0;
        this.timerState.timeLeft = 0;
        this.customSecondsAngle = null;
        this.dragState = 'idle';
        this.ringCompleteTime.fill(null);
      }

      triggerEndPulse() {
        this.timerCompleteAnim.active = true;
        this.timerCompleteAnim.startTime = Date.now();
      }

      animate(timestamp) {
        const cx = this.canvas.width / 2;
        const cy = this.canvas.height / 2;

        // Timer countdown tick
        if (this.timerState.active && this.dragState === 'idle') {
          const elapsed = Math.floor((Date.now() - this.timerState.startTime) / 1000);
          this.timerState.timeLeft = this.timerState.duration - elapsed;

          if (this.timerState.timeLeft <= 0) {
            this.triggerEndPulse();
            this.resetTimer();
            triggerAlarm(this.index);
          }
        }

        // Add class running to containerEl for CSS styling (status-dot, etc.)
        if (this.timerState.active && this.dragState === 'idle') {
          this.containerEl.classList.add('running');
        } else {
          this.containerEl.classList.remove('running');
        }

        // Draw Canvas Background State Gradients
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        const maxRadius = (this.canvas.width / 2) * 0.88;

        // Draw overlapping radial gradients when complete or running
        if (this.timerCompleteAnim.active) {
          const elapsedAnim = Date.now() - this.timerCompleteAnim.startTime;
          if (elapsedAnim <= 500) {
            const progress = elapsedAnim / 500;
            const alpha = 0.15 * Math.sin(progress * Math.PI);

            // Gradient 1: Center
            const bgGrad1 = this.ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius);
            bgGrad1.addColorStop(0, `rgba(255, 51, 34, ${alpha})`);
            bgGrad1.addColorStop(1, 'rgba(255, 51, 34, 0)');
            this.ctx.fillStyle = bgGrad1;
            this.ctx.beginPath();
            this.ctx.arc(cx, cy, maxRadius, 0, Math.PI * 2);
            this.ctx.fill();

            // Gradient 2: Off-center (60% canvas = maxRadius * 1.36)
            const ox = cx + Math.cos(this.bgOffsetAngle) * this.bgOffsetDist * this.scale;
            const oy = cy + Math.sin(this.bgOffsetAngle) * this.bgOffsetDist * this.scale;
            const bgGrad2 = this.ctx.createRadialGradient(ox, oy, 0, ox, oy, maxRadius * 1.36);
            bgGrad2.addColorStop(0, `rgba(255, 51, 34, ${alpha * 0.8})`);
            bgGrad2.addColorStop(1, 'rgba(255, 51, 34, 0)');
            this.ctx.fillStyle = bgGrad2;
            this.ctx.beginPath();
            this.ctx.arc(ox, oy, maxRadius * 1.36, 0, Math.PI * 2);
            this.ctx.fill();
          } else {
            this.timerCompleteAnim.active = false;
          }
        } else if (this.timerState.active && this.dragState === 'idle') {
          const activeIdx = Math.floor(((this.timerState.duration - this.timerState.timeLeft) / this.timerState.duration) * 8);
          const isLastSegment = (activeIdx === 7);
          const startAlpha = isLastSegment ? 0.06 : 0.03;

          // Gradient 1: Center
          const bgGrad1 = this.ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius);
          bgGrad1.addColorStop(0, `rgba(255, 51, 34, ${startAlpha})`);
          bgGrad1.addColorStop(1, 'rgba(255, 51, 34, 0)');
          this.ctx.fillStyle = bgGrad1;
          this.ctx.beginPath();
          this.ctx.arc(cx, cy, maxRadius, 0, Math.PI * 2);
          this.ctx.fill();

          // Gradient 2: Off-center (60% canvas = maxRadius * 1.36)
          const ox = cx + Math.cos(this.bgOffsetAngle) * this.bgOffsetDist * this.scale;
          const oy = cy + Math.sin(this.bgOffsetAngle) * this.bgOffsetDist * this.scale;
          const bgGrad2 = this.ctx.createRadialGradient(ox, oy, 0, ox, oy, maxRadius * 1.36);
          bgGrad2.addColorStop(0, 'rgba(255, 51, 34, 0.04)');
          bgGrad2.addColorStop(1, 'rgba(255, 51, 34, 0)');
          this.ctx.fillStyle = bgGrad2;
          this.ctx.beginPath();
          this.ctx.arc(ox, oy, maxRadius * 1.36, 0, Math.PI * 2);
          this.ctx.fill();
        }

        // Draw Faint Radial Gradient behind clock (rgba(255,255,255,0.02) -> transparent)
        const radialGrad = this.ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius * 1.25);
        radialGrad.addColorStop(0, 'rgba(255, 255, 255, 0.02)');
        radialGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        this.ctx.fillStyle = radialGrad;
        this.ctx.beginPath();
        this.ctx.arc(cx, cy, maxRadius * 1.25, 0, Math.PI * 2);
        this.ctx.fill();

        // Draw Concentric Rings
        const activeIdx = this.timerState.active
          ? Math.max(0, Math.min(7, Math.floor(((this.timerState.duration - this.timerState.timeLeft) / this.timerState.duration) * 8)))
          : -1;

        for (let i = 0; i < 8; i++) {
          const radius = this.getRingRadius(i);
          const breatheOffset = 0.08 * Math.sin((Date.now() / this.breathePeriods[i]) * Math.PI * 2 + this.breathePhases[i]);

          if (!this.timerState.active) {
            // Idle rings: oscillating base opacity (±0.08) and rotating break gap (3-5 deg)
            let opacity = 0.5 - (i / 7) * 0.38 + breatheOffset;
            opacity = Math.max(0.01, Math.min(1.0, opacity));
            this.ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
            this.ctx.lineWidth = 1;

            const gapAngle = (Date.now() * this.gapSpeeds[i]) % (Math.PI * 2);
            const gapWidth = this.gapWidths[i];
            const startAngle = gapAngle + gapWidth / 2;
            const endAngle = gapAngle + Math.PI * 2 - gapWidth / 2;

            this.ctx.beginPath();
            this.ctx.arc(cx, cy, radius, startAngle, endAngle);
            this.ctx.stroke();
          } else {
            // Running rings
            if (i < activeIdx) {
              // Completed Ring (Gone, or fading smoothly over 0.5s)
              if (this.ringCompleteTime[i] === null) {
                this.ringCompleteTime[i] = Date.now();
              }
              const elapsed = Date.now() - this.ringCompleteTime[i];
              if (elapsed < 500) {
                const fadeOpacity = Math.max(0, 0.9 * (1 - elapsed / 500));
                this.ctx.strokeStyle = `rgba(255, 255, 255, ${fadeOpacity})`;
                this.ctx.lineWidth = 1;
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                this.ctx.stroke();
              }
            } else if (i === activeIdx) {
              this.ringCompleteTime[i] = null; // Reset

              // Draw active white ring base with breathing
              let baseOpacity = 0.9 + breatheOffset;
              baseOpacity = Math.max(0.01, Math.min(1.0, baseOpacity));
              this.ctx.strokeStyle = `rgba(255, 255, 255, ${baseOpacity})`;
              this.ctx.lineWidth = 2;
              this.ctx.beginPath();
              this.ctx.arc(cx, cy, radius, 0, Math.PI * 2);
              this.ctx.stroke();

              // Draw rotating progress arc overlay (#FF3322, 2px)
              const S_d = this.timerState.duration / 8;
              const elapsedInSeg = (this.timerState.duration - this.timerState.timeLeft) % S_d;
              const ratioRemaining = 1 - (elapsedInSeg / S_d);

              const rotationOffset = (Date.now() * 0.0004) % (Math.PI * 2);
              const startAngle = -Math.PI / 2 + rotationOffset + (Math.PI * 2) * (1 - ratioRemaining);
              const endAngle = -Math.PI / 2 + rotationOffset + Math.PI * 2;

              // Arc Tip Trail (last 15 degrees) fading from #FF3322 to transparent
              const trailSegments = 15;
              const trailAngleRad = 15 * Math.PI / 180;
              const segmentAngle = trailAngleRad / trailSegments;
              for (let j = 0; j < trailSegments; j++) {
                const alpha = (j / trailSegments) * 0.9;
                this.ctx.strokeStyle = `rgba(255, 51, 34, ${alpha})`;
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                const sAngle = startAngle - (trailSegments - j) * segmentAngle;
                const eAngle = startAngle - (trailSegments - j - 1) * segmentAngle;
                this.ctx.arc(cx, cy, radius, sAngle, eAngle);
                this.ctx.stroke();
              }

              // Active arc
              this.ctx.strokeStyle = '#FF3322';
              this.ctx.lineWidth = 2;
              this.ctx.beginPath();
              this.ctx.arc(cx, cy, radius, startAngle, endAngle);
              this.ctx.stroke();

              // Arc Tip: 4px dot, #FF3322, shadowBlur 8
              const tipX = cx + Math.cos(startAngle) * radius;
              const tipY = cy + Math.sin(startAngle) * radius;

              this.ctx.save();
              this.ctx.shadowBlur = 8;
              this.ctx.shadowColor = '#FF3322';
              this.ctx.fillStyle = '#FF3322';
              this.ctx.beginPath();
              this.ctx.arc(tipX, tipY, 4, 0, Math.PI * 2);
              this.ctx.fill();
              this.ctx.restore();
            } else {
              // Remaining rings: warm tint (rgba(255,240,230,0.2) + breathe) and rotating gap
              this.ringCompleteTime[i] = null; // Reset
              let opacity = 0.2 + breatheOffset;
              opacity = Math.max(0.01, Math.min(1.0, opacity));
              this.ctx.strokeStyle = `rgba(255, 240, 230, ${opacity})`;
              this.ctx.lineWidth = 0.5;

              const gapAngle = (Date.now() * this.gapSpeeds[i]) % (Math.PI * 2);
              const gapWidth = this.gapWidths[i];
              const startAngle = gapAngle + gapWidth / 2;
              const endAngle = gapAngle + Math.PI * 2 - gapWidth / 2;

              this.ctx.beginPath();
              this.ctx.arc(cx, cy, radius, startAngle, endAngle);
              this.ctx.stroke();
            }
          }
        }

        // Draw tiny fixed center dot (rgba(255,255,255,0.15), 2px circle)
        this.ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        this.ctx.beginPath();
        this.ctx.arc(cx, cy, 2, 0, Math.PI * 2);
        this.ctx.fill();

        // Draw Click Sparks Burst Lines (fades over 0.4s)
        const nowTimeComp = Date.now();
        for (let i = this.clickBursts.length - 1; i >= 0; i--) {
          const b = this.clickBursts[i];
          const elapsed = nowTimeComp - b.startTime;
          if (elapsed > 400) {
            this.clickBursts.splice(i, 1);
            continue;
          }

          const progress = elapsed / 400;
          const opacity = 1 - progress;

          this.ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
          this.ctx.lineWidth = 1 * this.scale;

          b.lines.forEach(l => {
            const dist = l.speed * progress * 20 * this.scale; 
            const sx = b.x + Math.cos(l.angle) * dist;
            const sy = b.y + Math.sin(l.angle) * dist;
            const ex = sx + Math.cos(l.angle) * l.length * this.scale;
            const ey = sy + Math.sin(l.angle) * l.length * this.scale;

            this.ctx.beginPath();
            this.ctx.moveTo(sx, sy);
            this.ctx.lineTo(ex, ey);
            this.ctx.stroke();
          });
        }

        // Text labels inside clock
        this.ctx.save();
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';

        if (this.dragState !== 'idle') {
          // Setting readout: MM:00 at 18px in white
          this.ctx.font = `bold ${Math.round(18 * this.scale)}px ui-monospace, SFMono-Regular, monospace`;
          this.ctx.fillStyle = '#ffffff';
          const displayMins = Math.round(this.dragMinutes);
          this.ctx.fillText(`${pad(displayMins)}:00`, cx, cy);
        } else if (this.timerState.active) {
          // Running readout: MM:SS at 14px white (or red & pulsing on last segment)
          const isLastSegment = (activeIdx === 7);
          let fontColor = '#ffffff';
          let scale = 1.0;

          if (isLastSegment) {
            fontColor = '#FF3322';
            scale = 1.0 + 0.05 * Math.abs(Math.sin(Date.now() * 0.003)); // 1.0 to 1.05 pulse
          }

          this.ctx.fillStyle = fontColor;
          const fontSize = Math.round(14 * this.scale * scale);
          this.ctx.font = `bold ${fontSize}px ui-monospace, SFMono-Regular, monospace`;

          const mins = Math.floor(this.timerState.timeLeft / 60);
          const secs = this.timerState.timeLeft % 60;
          this.ctx.fillText(`${pad(mins)}:${pad(secs)}`, cx, cy);
        } else {
          // Idle readout: DRAG at 9px rgba(255,255,255,0.2)
          this.ctx.font = `${Math.round(9 * this.scale)}px ui-monospace, SFMono-Regular, monospace`;
          this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
          this.ctx.fillText("DRAG", cx, cy);
        }
        this.ctx.restore();
      }
    }

    // Instantiate 4 Timer Instances
    const clocks = [];
    const cellContainers = [
      document.getElementById('cell-0'),
      document.getElementById('cell-1'),
      document.getElementById('cell-2'),
      document.getElementById('cell-3')
    ];

    cellContainers.forEach((el, index) => {
      clocks.push(new TimerRing(index, el));
    });

    // Handle Responsive Layout and Resize
    function updateLayout() {
      const gap = window.innerWidth < 600 ? 24 : 48;
      const padding = window.innerWidth < 600 ? 16 : 32;
      const availW = window.innerWidth - padding * 2 - gap;
      const availH = window.innerHeight - padding * 2 - gap - 60;
      const timerSize = Math.min(availW / 2, availH / 2, 280);

      const root = document.documentElement;
      root.style.setProperty('--timer-size', `${timerSize}px`);
      root.style.setProperty('--grid-gap', `${gap}px`);

      clocks.forEach(c => {
        c.canvas.width = timerSize;
        c.canvas.height = timerSize;
        c.scale = timerSize / 280;
      });
    }

    // Call initially and bind to window resize
    updateLayout();
    window.addEventListener('resize', updateLayout);

    // Shared requestAnimationFrame Loop
    function globalLoop(timestamp) {
      clocks.forEach(c => c.animate(timestamp));

      // Viewport Center Clock Updates
      const now = new Date();
      const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      document.querySelector('#centerTime .time-readout').textContent = timeStr;

      requestAnimationFrame(globalLoop);
    }
    requestAnimationFrame(globalLoop);

    // Alarm Controller State
    let alarmState = {
      active: false,
      timerIndex: -1,
      startTime: 0,
      canvas: document.getElementById('alarmCanvas'),
      ctx: document.getElementById('alarmCanvas').getContext('2d')
    };

    function triggerAlarm(index) {
      alarmState.active = true;
      alarmState.timerIndex = index;
      alarmState.startTime = Date.now();

      const overlay = document.getElementById('alarmOverlay');
      overlay.classList.add('active');
      document.getElementById('alarmTimerId').textContent = `TIMER 0${index + 1}`;

      updateAlarmTime();
      requestAnimationFrame(drawAlarmOverlay);
    }

    function dismissAlarm() {
      if (!alarmState.active) return;
      
      const overlay = document.getElementById('alarmOverlay');
      overlay.classList.remove('active');

      // Reset that timer back to idle
      clocks[alarmState.timerIndex].resetTimer();

      alarmState.active = false;
    }

    function updateAlarmTime() {
      const now = new Date();
      const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      document.getElementById('alarmCurrentTime').textContent = timeStr;
    }

    // Expanding Staggered Rings Animation loop on Alarm Overlay
    function drawAlarmOverlay() {
      if (!alarmState.active) return;

      const canvas = alarmState.canvas;
      const ctx = alarmState.ctx;

      if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      const elapsed = Date.now() - alarmState.startTime;
      const loopDuration = 2000;
      const timeInLoop = elapsed % loopDuration;

      // Draw all 8 rings staggered expanding +20px and fading out (scaled and aligned to maxRadius)
      const alarmScale = clocks[0] ? clocks[0].scale : 1.0;
      ctx.lineWidth = 1 * alarmScale;
      const maxRadius = (clocks[0] ? (clocks[0].canvas.width / 2) * 0.88 : 120);

      for (let i = 0; i < 8; i++) {
        const staggerIndex = 7 - i; // Innermost (7) first
        const delay = staggerIndex * 100;
        const animDuration = 800; // 0.8s duration

        if (timeInLoop >= delay && timeInLoop < delay + animDuration) {
          const t_ring = (timeInLoop - delay) / animDuration;
          const startRadius = maxRadius - i * (maxRadius * 0.75 / 7);
          const currentRadius = startRadius + t_ring * 20 * alarmScale;
          const opacity = 1 - t_ring;

          ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.35})`;
          ctx.beginPath();
          ctx.arc(cx, cy, currentRadius, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      // Title Easing Slide-Up and Scale-Pulse
      const slideProgress = Math.min(1, elapsed / 300);
      const easeSlide = 1 - Math.pow(1 - slideProgress, 3); // Cubic Ease-Out
      const translateY = 30 * (1 - easeSlide);

      const pulseCycle = (elapsed % 800) / 800;
      const scale = 1.0 + 0.03 * Math.sin(pulseCycle * Math.PI * 2);

      const titleEl = document.getElementById('alarmTitle');
      if (titleEl) {
        titleEl.style.transform = `translateY(${translateY}px) scale(${scale})`;
        titleEl.style.opacity = Math.min(1, elapsed / 200);
      }

      // Pulse background between #0a0a0a and #1a0000 every 0.4s (6 cycles max)
      let bg = '#0a0a0a';
      if (elapsed < 2400) {
        const pulseCycle = Math.floor(elapsed / 400);
        const cycleProgress = (elapsed % 400) / 400;
        const pulseAlpha = Math.sin(cycleProgress * Math.PI);
        const r = Math.round(10 + (26 - 10) * pulseAlpha);
        const g = Math.round(10 - 10 * pulseAlpha);
        const b = Math.round(10 - 10 * pulseAlpha);
        bg = `rgb(${r}, ${g}, ${b})`;
      }
      document.getElementById('alarmOverlay').style.backgroundColor = bg;

      // Update overlay HH:MM:SS clock
      updateAlarmTime();

      requestAnimationFrame(drawAlarmOverlay);
    }

    // Dismiss overlay handler on click/tap
    document.getElementById('alarmOverlay').addEventListener('click', dismissAlarm);
  </script>
</body>
</html>
