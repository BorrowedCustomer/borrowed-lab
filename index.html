<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BORROWED LAB.</title>
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0a0f;
      color: rgba(255, 255, 255, 0.85);
      /* Base monospace styling utilizing system Courier default */
      font-family: "Courier New", Courier, monospace;
      line-height: 1.6;
      padding: 120px 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* 1. Title section styling */
    header {
      margin-bottom: 80px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .description {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 12px;
    }

    .back-link {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      display: inline-block;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: #ffffff;
    }

    /* 2. Experiment sections */
    .category-section {
      margin-bottom: 48px;
    }

    .category-header {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .experiment-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .experiment-item {
      font-size: 1.1rem;
      padding: 4px 0;
    }

    .experiment-item a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      display: inline-block;
      transition: color 0.2s ease;
    }

    .experiment-item a:hover {
      text-decoration: underline;
    }

    /* Coming Soon locked items */
    .experiment-item.locked {
      color: rgba(255, 255, 255, 0.2);
      cursor: default;
    }

    /* 3. Footer */
    footer {
      margin-top: 80px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header>
      <h1>BORROWED LAB.</h1>
      <p class="description">A place for experimentation and creation.</p>
      <a href="#" class="back-link">← borrowedpage.kr</a>
    </header>

    <!-- Main Content Dynamic Container -->
    <main id="mainContent"></main>

    <!-- Footer -->
    <footer>
      <span>© 2025 BORROWED PAGE.</span>
    </footer>
  </div>

  <script>
    // -------------------------------------------------------------
    // Dynamic Experiment List Array
    // -------------------------------------------------------------
    const EXPERIMENTS = [
      { category: "PARTICLE", title: "Nebula", url: "./experiments/nebula/" },
      { category: "GENERATIVE", title: "Timepiece", url: "./experiments/vine/" },
      { category: "COMING SOON", title: "Lightspeed", url: null },
      { category: "COMING SOON", title: "Graviton", url: null }
    ];

    const main = document.getElementById('mainContent');
    const groups = {};

    // Group experiments by category sequentially while preserving order
    EXPERIMENTS.forEach(exp => {
      if (!groups[exp.category]) {
        groups[exp.category] = [];
      }
      groups[exp.category].push(exp);
    });

    // Render grouped categories dynamically
    let categoryIndex = 1;
    for (const category in groups) {
      const items = groups[category];
      const countStr = String(categoryIndex).padStart(3, '0');
      categoryIndex++;
      
      const section = document.createElement('section');
      section.className = 'category-section';
      
      let itemsHTML = '';
      items.forEach(item => {
        if (!item.url) {
          itemsHTML += `<div class="experiment-item locked">${item.title}</div>`;
        } else {
          itemsHTML += `<div class="experiment-item"><a href="${item.url}">${item.title}</a></div>`;
        }
      });
      
      section.innerHTML = `
        <h2 class="category-header">${category}, ${countStr}</h2>
        <div class="experiment-list">
          ${itemsHTML}
        </div>
      `;
      
      main.appendChild(section);
    }
  </script>
</body>
</html>
